<!DOCTYPE HTML>
<html>

<head>
    <title>Satyajeet@IBM</title>
    <link rel="icon" href="retirement.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-top: 25px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 38px;
            font-weight: 500;
            margin: 15px 0;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 300;
            color: #a0a0a0;
            margin-top: 15px;
        }

        .countdown-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 35px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        .time-unit {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .time-unit:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .time-value {
            font-size: 44px;
            font-weight: 600;
            color: #00d4ff;
            display: block;
            margin-bottom: 8px;
            font-family: 'Fjalla One', 'IBM Plex Sans', sans-serif;
            letter-spacing: 2.0px;
        }

        .time-label {
            font-size: 13px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
        }

        .milestone-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 30px auto 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .milestone {
            text-align: center;
            flex: 1;
        }

        .milestone-date {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .milestone-label {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 0 20px;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #00a8cc 100%);
            border-radius: 2px;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .countdown-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }

            .time-unit {
                padding: 20px 10px;
            }

            .time-value {
                font-size: 40px;
            }

            .countdown-section {
                padding: 30px 20px;
            }

            .milestone-indicator {
                flex-direction: column;
                gap: 15px;
            }

            .progress-bar {
                width: 100%;
                margin: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .countdown-section {
            animation: fadeIn 0.6s ease-out;
        }

        .countdown-section:nth-child(2) {
            animation-delay: 0.2s;
            opacity: 0;
            animation-fill-mode: forwards;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo-text">IBM CAREER MILESTONE</div>
            <h1>Satyajeet's Retirement Journey</h1>
        </div>

        <div class="countdown-section">
            <div class="section-title">Time Until Retirement</div>
            <div class="countdown-grid">
                <div class="time-unit">
                    <span class="time-value" id="year">00</span>
                    <div class="time-label">Years</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="month">00</span>
                    <div class="time-label">Months</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="day">00</span>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="hour">00</span>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="minute">00</span>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="second">00</span>
                    <div class="time-label">Seconds</div>
                </div>
            </div>
        </div>

        <div class="countdown-section">
            <div class="section-title">Length of Service</div>
            <div class="countdown-grid">
                <div class="time-unit">
                    <span class="time-value" id="joiningyear">00</span>
                    <div class="time-label">Years</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="joiningmonth">00</span>
                    <div class="time-label">Months</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="joiningday">00</span>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="joininghour">00</span>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="joiningminute">00</span>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="joiningsecond">00</span>
                    <div class="time-label">Seconds</div>
                </div>
            </div>

            <div class="milestone-indicator">
                <div class="milestone">
                    <div class="milestone-date">Jan 20, 2014</div>
                    <div class="milestone-label">Joined IBM</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="milestone">
                    <div class="milestone-date">Apr 30, 2048</div>
                    <div class="milestone-label">Retirement</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function pad2(n) {
            return n < 10 ? "0" + n : n;
        }

        function pad(n) {
            return n < 10 ? "0" + n : n;
        }

        function updateAllCountdowns() {
            // Get current time once for both countdowns
            var now = Date.now();

            // Using IST (India Standard Time) - UTC+5:30
            var startDate = Date.UTC(2014, 0, 19, 18, 30, 0); // January 20, 2014 00:00:00 IST (midnight)
            var deadline = Date.UTC(2048, 3, 30, 18, 30, 0); // April 30, 2048 24:00:00 IST (midnight)

            var distanceToRetirement = deadline - now;
            var distanceFromStart = now - startDate;

            // Retirement countdown
            var years = Math.floor(distanceToRetirement / (1000 * 60 * 60 * 24 * 365.25));
            var remainingDays = Math.floor(distanceToRetirement % (1000 * 60 * 60 * 24 * 365.25));
            var months = Math.floor(remainingDays / (1000 * 60 * 60 * 24 * (365.25 / 12)));
            remainingDays = Math.floor(remainingDays % (1000 * 60 * 60 * 24 * (365.25 / 12)));
            var days = Math.floor(remainingDays / (1000 * 60 * 60 * 24));
            var hours = Math.floor((distanceToRetirement % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((distanceToRetirement % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((distanceToRetirement % (1000 * 60)) / 1000);

            document.getElementById("year").innerHTML = pad(years);
            document.getElementById("month").innerHTML = pad(months);
            document.getElementById("day").innerHTML = pad2(days);
            document.getElementById("hour").innerHTML = pad2(hours);
            document.getElementById("minute").innerHTML = pad2(minutes);
            document.getElementById("second").innerHTML = pad2(seconds);

            if (distanceToRetirement < 0) {
                document.getElementById("year").innerHTML = '00';
                document.getElementById("month").innerHTML = '00';
                document.getElementById("day").innerHTML = '00';
                document.getElementById("hour").innerHTML = '00';
                document.getElementById("minute").innerHTML = '00';
                document.getElementById("second").innerHTML = '00';
            }

            // Service length countdown
            var years2 = Math.floor(distanceFromStart / (1000 * 60 * 60 * 24 * 365.25));
            var remainingDays2 = Math.floor(distanceFromStart % (1000 * 60 * 60 * 24 * 365.25));
            var months2 = Math.floor(remainingDays2 / (1000 * 60 * 60 * 24 * (365.25 / 12)));
            remainingDays2 = Math.floor(remainingDays2 % (1000 * 60 * 60 * 24 * (365.25 / 12)));
            var days2 = Math.floor(remainingDays2 / (1000 * 60 * 60 * 24));
            var hours2 = Math.floor((distanceFromStart % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes2 = Math.floor((distanceFromStart % (1000 * 60 * 60)) / (1000 * 60));
            var seconds2 = Math.floor((distanceFromStart % (1000 * 60)) / 1000);

            document.getElementById("joiningyear").innerHTML = pad(years2);
            document.getElementById("joiningmonth").innerHTML = pad(months2);
            document.getElementById("joiningday").innerHTML = pad2(days2);
            document.getElementById("joininghour").innerHTML = pad2(hours2);
            document.getElementById("joiningminute").innerHTML = pad2(minutes2);
            document.getElementById("joiningsecond").innerHTML = pad2(seconds2);

            // Update progress bar
            var totalDuration = deadline - startDate;
            var progress = (distanceFromStart / totalDuration) * 100;
            document.getElementById("progressBar").style.width = progress + "%";
        }

        updateAllCountdowns();

        setInterval(function () {
            updateAllCountdowns();
        }, 1000);
    </script>
</body>

</html>
